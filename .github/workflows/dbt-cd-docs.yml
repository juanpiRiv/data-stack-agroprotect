name: dbt-cd-docs

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    env:
      BIGQUERY_PROJECT_ID: ${{ secrets.BIGQUERY_PROJECT_ID || 'agro-protect-490822' }}
      BIGQUERY_DATASET_ID: ${{ secrets.BIGQUERY_DATASET_ID }}
      BIGQUERY_LOCATION: ${{ secrets.BIGQUERY_LOCATION || 'southamerica-east1' }}
      DBT_GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/gcp-dbt-service-account.json
      GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/gcp-dbt-service-account.json
      DBT_USER: ci
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: agro-protect
        run: |
          python -m pip install --upgrade pip uv
          uv pip install --system -e ".[transform]"

      - name: Decode GCP credentials
        run: |
          printf '%s' "${{ secrets.DBT_GOOGLE_APPLICATION_CREDENTIALS }}" | base64 -d > "${DBT_GOOGLE_APPLICATION_CREDENTIALS}"
          chmod 600 "${DBT_GOOGLE_APPLICATION_CREDENTIALS}"

      - name: Prepare dbt profiles
        run: |
          cp agro-protect/transform/profiles.yml.example agro-protect/transform/profiles.yml

      - name: dbt deps and parse
        working-directory: agro-protect/transform
        env:
          DBT_PROFILES_DIR: ${{ github.workspace }}/agro-protect/transform
        run: |
          dbt deps
          dbt parse

  deploy:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    concurrency:
      group: pages
      cancel-in-progress: true
    env:
      BIGQUERY_PROJECT_ID: ${{ secrets.BIGQUERY_PROJECT_ID || 'agro-protect-490822' }}
      BIGQUERY_DATASET_ID: ${{ secrets.BIGQUERY_DATASET_ID }}
      BIGQUERY_LOCATION: ${{ secrets.BIGQUERY_LOCATION || 'southamerica-east1' }}
      # secrets no puede usarse en `if:` de steps; se copia acá y se condiciona con env.* abajo.
      DBT_MANIFEST_GCS_URI: ${{ secrets.DBT_MANIFEST_GCS_URI }}
      DBT_GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/gcp-dbt-service-account.json
      GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/gcp-dbt-service-account.json
      DBT_USER: ${{ secrets.DBT_USER }}
      # Dataset real de la fuente tap_nasa (default raw_nasa). Si en BQ tiene otro nombre, definí variable de repo o secret.
      DBT_RAW_NASA_DATASET: ${{ vars.DBT_RAW_NASA_DATASET }}
      DBT_TAP_AGRO_DATASET: ${{ vars.DBT_TAP_AGRO_DATASET || 'prod_tap_agro' }}
      PAGES_ARTIFACT_NAME: github-pages-${{ github.run_attempt }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: agro-protect
        run: |
          python -m pip install --upgrade pip uv
          uv pip install --system -e ".[transform]"

      - name: Decode GCP credentials
        run: |
          printf '%s' "${{ secrets.DBT_GOOGLE_APPLICATION_CREDENTIALS }}" | base64 -d > "${DBT_GOOGLE_APPLICATION_CREDENTIALS}"
          chmod 600 "${DBT_GOOGLE_APPLICATION_CREDENTIALS}"

      # Secret vacío o solo espacios deja BIGQUERY_PROJECT_ID ""; dbt y setup-gcloud fallan o se comportan mal.
      - name: Normalize BIGQUERY_PROJECT_ID
        run: |
          set -euo pipefail
          BQP="$(printf '%s' "${BIGQUERY_PROJECT_ID:-}" | xargs)"
          if [ -z "${BQP}" ]; then
            BQP="$(jq -r '.project_id // empty' "${GOOGLE_APPLICATION_CREDENTIALS}" | xargs)"
          fi
          if [ -z "${BQP}" ]; then
            BQP="agro-protect-490822"
          fi
          echo "BIGQUERY_PROJECT_ID=${BQP}" >> "${GITHUB_ENV}"
          echo "GOOGLE_CLOUD_PROJECT=${BQP}" >> "${GITHUB_ENV}"
          echo "GOOGLE_CLOUD_QUOTA_PROJECT=${BQP}" >> "${GITHUB_ENV}"

      # Igual que export-bigquery-gcs: secret ≠ proyecto de la key → dbt falla con "Not found: Project".
      - name: Set up gcloud (verificar proyecto BigQuery)
        uses: google-github-actions/setup-gcloud@v2

      - name: Authenticate gcloud and align BIGQUERY_PROJECT_ID
        run: |
          set -euo pipefail
          gcloud auth activate-service-account --key-file="${GOOGLE_APPLICATION_CREDENTIALS}"
          BQP="$(printf '%s' "${BIGQUERY_PROJECT_ID}" | xargs)"
          KEY_PID="$(jq -r '.project_id // empty' "${GOOGLE_APPLICATION_CREDENTIALS}" | xargs)"
          if bq ls --project_id="${BQP}" "${BQP}:" >/dev/null 2>&1; then
            echo "::notice::BIGQUERY_PROJECT_ID=${BQP} OK (bq ls)."
          elif [ -n "${KEY_PID}" ] && bq ls --project_id="${KEY_PID}" "${KEY_PID}:" >/dev/null 2>&1; then
            echo "::warning::BIGQUERY_PROJECT_ID (${BQP}) no accesible con esta SA; usando project_id del JSON (${KEY_PID})."
            BQP="${KEY_PID}"
            echo "BIGQUERY_PROJECT_ID=${BQP}" >> "${GITHUB_ENV}"
            echo "GOOGLE_CLOUD_PROJECT=${BQP}" >> "${GITHUB_ENV}"
            echo "GOOGLE_CLOUD_QUOTA_PROJECT=${BQP}" >> "${GITHUB_ENV}"
          else
            echo "::error::La SA de dbt no puede ejecutar bq ls en BIGQUERY_PROJECT_ID ni en project_id de la key. Revisá IAM (BigQuery) y que el secret sea el **ID** de proyecto GCP (Configuración → ID del proyecto), no el nombre."
            exit 1
          fi
          # Evitar `gcloud config set project`: puede llamar Cloud Resource Manager API (a menudo deshabilitada para SAs).
          echo "CLOUDSDK_CORE_PROJECT=${BQP}" >> "${GITHUB_ENV}"

      # dbt-bigquery usa location del perfil para jobs; si stg está en southamerica-east1 y el secret dice US →
      # "Dataset stg was not found in location".
      - name: Align BIGQUERY_LOCATION with stg or analytics + ensure stg
        run: |
          set -euo pipefail
          PROJECT="$(printf '%s' "${BIGQUERY_PROJECT_ID}" | xargs)"
          SCHEMA_MAIN="$(printf '%s' "${BIGQUERY_DATASET_ID:-analytics}" | xargs)"
          SCHEMA_MAIN="${SCHEMA_MAIN:-analytics}"

          # bq a veces devuelve texto de error en stdout; jq rompe con "parse error" si no es JSON.
          ds_location() {
            local ds="$1"
            local info loc
            info=$(bq show --format=json --project_id="${PROJECT}" "${PROJECT}:${ds}" 2>/dev/null || true)
            info="${info#"${info%%[![:space:]]*}"}"
            info="${info%"${info##*[![:space:]]}"}"
            [ -z "${info}" ] && echo "" && return
            case "${info}" in
              \{*) ;;
              *) echo "" && return ;;
            esac
            loc=$(printf '%s' "${info}" | python3 -c "import json,sys; print(json.load(sys.stdin).get('location') or '')" 2>/dev/null || true)
            printf '%s' "${loc}"
          }

          norm_upper() { printf '%s' "$1" | tr '[:lower:]' '[:upper:]'; }

          RAW_DS="$(printf '%s' "${DBT_RAW_NASA_DATASET:-}" | xargs)"
          RAW_DS="${RAW_DS:-prod_tap_agro}"
          TAP_DS="$(printf '%s' "${DBT_TAP_AGRO_DATASET:-prod_tap_agro}" | xargs)"
          TAP_DS="${TAP_DS:-prod_tap_agro}"

          STG_LOC="$(ds_location stg)"
          RAW_LOC="$(ds_location "${RAW_DS}")"
          TAP_LOC="$(ds_location "${TAP_DS}")"
          MAIN_LOC="$(ds_location "${SCHEMA_MAIN}")"

          # Una sola región para perfil dbt (catálogo introspecta todas las fuentes).
          WANT=""
          for loc in "${STG_LOC}" "${RAW_LOC}" "${TAP_LOC}" "${MAIN_LOC}"; do
            [ -z "${loc}" ] || [ "${loc}" = "null" ] && continue
            if [ -z "${WANT}" ]; then
              WANT="${loc}"
              continue
            fi
            if [ "$(norm_upper "${loc}")" != "$(norm_upper "${WANT}")" ]; then
              echo "::error::Datasets en regiones distintas (dbt-bigquery usa una sola location): stg=${STG_LOC} ${RAW_DS}=${RAW_LOC} ${TAP_DS}=${TAP_LOC} ${SCHEMA_MAIN}=${MAIN_LOC}. Unificá en BQ o revisá DBT_RAW_NASA_DATASET / nombres de dataset."
              exit 1
            fi
          done

          CUR="$(printf '%s' "${BIGQUERY_LOCATION}" | xargs)"
          if [ -n "${WANT}" ]; then
            if [ "$(norm_upper "${WANT}")" != "$(norm_upper "${CUR}")" ]; then
              echo "::warning::BIGQUERY_LOCATION=${CUR} distinto de datasets existentes (${WANT}). Ajustando para dbt prod y docs."
              echo "BIGQUERY_LOCATION=${WANT}" >> "${GITHUB_ENV}"
            fi
            CUR="${WANT}"
          fi

          if ! bq show --project_id="${PROJECT}" "${PROJECT}:stg" >/dev/null 2>&1; then
            echo "Creando dataset ${PROJECT}:stg en location=${CUR}…"
            bq --project_id="${PROJECT}" mk --dataset --location="${CUR}" "${PROJECT}:stg"
          fi

      - name: Prepare dbt profiles
        run: |
          cp agro-protect/transform/profiles.yml.example agro-protect/transform/profiles.yml

      - name: Run dbt build
        working-directory: agro-protect/transform
        env:
          DBT_PROFILES_DIR: ${{ github.workspace }}/agro-protect/transform
        run: |
          dbt deps
          dbt build --target prod

      # En CI no se usa `dbt docs serve` (solo sirve en local); aquí generate + artifact → Pages.
      - name: Generate dbt docs
        working-directory: agro-protect/transform
        env:
          DBT_PROFILES_DIR: ${{ github.workspace }}/agro-protect/transform
        run: |
          dbt docs generate --target prod

      - name: Verify dbt manifest for Pages and slim CI
        working-directory: agro-protect/transform
        run: |
          set -euo pipefail
          M="target/manifest.json"
          if [ ! -s "${M}" ]; then
            echo "::error::${M} missing or empty after dbt docs generate."
            exit 1
          fi
          jq -e '.metadata' "${M}" >/dev/null

      - name: Upload dbt manifest to GCS (slim CI en PRs)
        if: env.DBT_MANIFEST_GCS_URI != ''
        working-directory: agro-protect/transform
        run: |
          gcloud --project="${BIGQUERY_PROJECT_ID}" storage cp target/manifest.json "${DBT_MANIFEST_GCS_URI}"

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: agro-protect/transform/target
          name: ${{ env.PAGES_ARTIFACT_NAME }}

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          artifact_name: ${{ env.PAGES_ARTIFACT_NAME }}

      - name: URLs docs y manifest (slim CI)
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          echo "::notice::dbt docs: sitio interactivo en https://${GITHUB_REPOSITORY_OWNER}.github.io/${REPO_NAME}/ (requiere Settings → Pages → Source: GitHub Actions). Slim CI en PRs puede usar manifest.json en esa misma base URL o el secret DBT_MANIFEST_GCS_URI."
