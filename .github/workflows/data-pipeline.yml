name: data-pipeline

# Un solo flujo ELT: tap-agro (extract) → target-bigquery (load a GCP) en el mismo `meltano run`.
#
# - schedule / elt_daily_yesterday: meltano config set tap-agro days_back 1 (ayer en timezone del tap; ver tap-meteorology).
# - elt_meltano_yml: entorno yaml_window (start_date/end_date acotados en meltano.yml; sin days_back).

on:
  schedule:
    - cron: "5 10 * * *"
  workflow_dispatch:
    inputs:
      elt_mode:
        description: "Modo al disparar a mano"
        required: true
        type: choice
        default: elt_daily_yesterday
        options:
          - elt_daily_yesterday
          - elt_meltano_yml
          - validate_only
      meltano_env:
        description: "Entorno Meltano (dataset {env}_tap_agro); schedule → prod. elt_meltano_yml → siempre yaml_window (este campo no aplica)."
        required: true
        default: prod
        type: choice
        options:
          - prod
          - dev
          - ci

jobs:
  meltano-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: agro-protect
        run: |
          python -m pip install --upgrade pip uv
          uv pip install --system -e ".[extraction]"

      - name: Install Meltano plugins
        working-directory: agro-protect/extraction
        run: |
          chmod +x scripts/meltano_install.sh scripts/patch_meltano_loader_venvs.sh
          ./scripts/meltano_install.sh

      - name: Discover tap-agro
        if: github.event_name == 'workflow_dispatch'
        working-directory: agro-protect/extraction
        env:
          TAP_AGRO_USE_OPEN_METEO: 'false'
        run: |
          meltano invoke tap-agro --discover > /dev/null

      - name: Decode Meltano GCP credentials
        if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.elt_mode != 'validate_only')
        run: |
          printf '%s' "${{ secrets.MELTANO_GOOGLE_APPLICATION_CREDENTIALS }}" | base64 -d > "${{ github.workspace }}/gcp-meltano-service-account.json"
          chmod 600 "${{ github.workspace }}/gcp-meltano-service-account.json"

      - name: Extract + load → BigQuery (tap-agro | target-bigquery)
        if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.elt_mode != 'validate_only')
        working-directory: agro-protect/extraction
        env:
          TAP_AGRO_USE_OPEN_METEO: 'false'
          BIGQUERY_PROJECT_ID: ${{ secrets.BIGQUERY_PROJECT_ID }}
          BIGQUERY_LOCATION: ${{ secrets.BIGQUERY_LOCATION }}
          MELTANO_GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/gcp-meltano-service-account.json
          GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/gcp-meltano-service-account.json
          MELTANO_STATE_BACKEND_URI: ${{ secrets.MELTANO_STATE_BACKEND_URI }}
          TARGET_BIGQUERY_PROJECT: ${{ secrets.TARGET_BIGQUERY_PROJECT || secrets.BIGQUERY_PROJECT_ID }}
          TARGET_BIGQUERY_LOCATION: ${{ secrets.TARGET_BIGQUERY_LOCATION || secrets.BIGQUERY_LOCATION }}
          TARGET_BIGQUERY_CREDENTIALS_PATH: ${{ github.workspace }}/gcp-meltano-service-account.json
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "schedule" ]; then
            MELTANO_ENV=prod
            USE_YESTERDAY=1
          else
            if [ "${{ inputs.elt_mode }}" = "elt_meltano_yml" ]; then
              MELTANO_ENV=yaml_window
              USE_YESTERDAY=0
            else
              MELTANO_ENV="${{ inputs.meltano_env }}"
              if [ "${{ inputs.elt_mode }}" = "elt_daily_yesterday" ]; then
                USE_YESTERDAY=1
              else
                USE_YESTERDAY=0
              fi
            fi
          fi

          if [ "$USE_YESTERDAY" = "1" ]; then
            echo "ELT: extract → load | tap-agro days_back=1 (ayer en timezone del tap, p. ej. America/Argentina/Buenos_Aires)"
            meltano --environment="${MELTANO_ENV}" config set tap-agro days_back 1
          else
            echo "ELT: extract → load | elt_meltano_yml (entorno yaml_window: fechas en meltano.yml)"
            meltano --environment="${MELTANO_ENV}" config unset tap-agro days_back || true
          fi

          meltano --environment="${MELTANO_ENV}" run tap-agro target-bigquery
