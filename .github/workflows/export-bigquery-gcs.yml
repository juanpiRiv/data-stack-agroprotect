# Exporta tablas/vistas de BigQuery al bucket GCS (NDJSON) para consumo desde un front.
# Requiere la cuenta de servicio del export (no reutilices la de Meltano salvo que tenga los mismos permisos).
#
# Secrets: EXPORT_GOOGLE_APPLICATION_CREDENTIALS (JSON en base64, sin saltos de línea),
#          BIGQUERY_PROJECT_ID, EXPORT_GCS_BUCKET_NAME,
#          y EXPORT_TABLE_MAP *o* EXPORT_BQ_TABLE_REF (+ opcional EXPORT_GCS_BLOB_NAME).
#
# Opcional: EXPORT_GCS_PREFIX (default prod/exports vía env en el job).

name: export-bigquery-gcs

on:
  schedule:
    - cron: "30 */6 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "agro-protect/scripts/export_to_gcs.py"
      - ".github/workflows/export-bigquery-gcs.yml"
      - "agro-protect/scripts/requirements-export.txt"
  workflow_run:
    workflows: [data-pipeline]
    types:
      - completed
    branches:
      - main

jobs:
  export-to-gcs:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    name: Export BigQuery → GCS
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      BIGQUERY_PROJECT_ID: ${{ secrets.BIGQUERY_PROJECT_ID }}
      EXPORT_GCS_BUCKET_NAME: ${{ secrets.EXPORT_GCS_BUCKET_NAME }}
      EXPORT_GCS_PREFIX: ${{ secrets.EXPORT_GCS_PREFIX }}
      EXPORT_TABLE_MAP: ${{ secrets.EXPORT_TABLE_MAP }}
      EXPORT_BQ_TABLE_REF: ${{ secrets.EXPORT_BQ_TABLE_REF }}
      EXPORT_GCS_BLOB_NAME: ${{ secrets.EXPORT_GCS_BLOB_NAME }}
      GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/gcp-export-service-account.json
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install export dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r agro-protect/scripts/requirements-export.txt

      - name: Decode GCP credentials (export SA)
        run: |
          printf '%s' "${{ secrets.EXPORT_GOOGLE_APPLICATION_CREDENTIALS }}" | base64 -d > "${GOOGLE_APPLICATION_CREDENTIALS}"
          chmod 600 "${GOOGLE_APPLICATION_CREDENTIALS}"

      - name: Export to GCS
        working-directory: agro-protect
        run: python scripts/export_to_gcs.py
