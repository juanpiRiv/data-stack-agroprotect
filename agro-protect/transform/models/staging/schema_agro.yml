version: 2

models:
  - name: stg_agro_locations
    description: Localidades del catálogo tap-agro (desde raw locations)
    columns:
      - name: location_id
        description: Identificador estable de la localidad
      - name: location_name
        description: Nombre legible
      - name: latitude
        description: Latitud (WGS84)
      - name: longitude
        description: Longitud (WGS84)

  - name: stg_agro_clima_diario_nasa_power
    description: Clima diario NASA POWER por localidad (raw aplanado)
    columns:
      - name: location_id
        description: FK lógica a locations
      - name: date
        description: Día de observación (DATE)
      - name: x_source
        description: Proveedor de datos (p. ej. nasa_power)
