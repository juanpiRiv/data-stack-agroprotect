version: 2

models:
  - name: stg_agro_locations
    description: Locations from tap-agro catalog (from raw locations)
    columns:
      - name: location_id
        description: Stable location identifier
      - name: location_name
        description: Human-readable name
      - name: province_name
        description: Province or region
      - name: latitude
        description: Latitude (WGS84)
      - name: longitude
        description: Longitude (WGS84)
      - name: country_code
        description: ISO country code (e.g. AR)
      - name: is_active
        description: Whether the location is active in the catalog

  - name: stg_agro_clima_diario_nasa_power
    description: Daily NASA POWER weather per location (flattened raw)
    columns:
      - name: location_id
        description: Logical FK to locations
      - name: date
        description: Observation day (DATE)
      - name: x_source
        description: Data provider (e.g. nasa_power)
