version: 2

models:
  - name: dim_location
    description: Current location dimension for weather and downstream marts.
    columns:
      - name: location_id
        tests:
          - not_null
          - unique
      - name: province_key
        tests:
          - not_null

  - name: dim_province
    description: Province dimension unified across weather, tax, and yield domains.
    columns:
      - name: province_key
        tests:
          - not_null
          - unique
      - name: province_name
        tests:
          - not_null
