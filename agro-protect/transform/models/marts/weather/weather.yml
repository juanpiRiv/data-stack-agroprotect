version: 2

models:
  - name: fct_weather_daily
    description: Daily weather fact table at location and date grain.
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - location_id
              - date
    columns:
      - name: location_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_location')
                field: location_id
      - name: province_key
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_province')
                field: province_key
      - name: date
        tests:
          - not_null
      - name: precipitation_mm
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: '>= 0'
              config:
                where: 'precipitation_mm is not null'
      - name: relative_humidity_pct
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: 'between 0 and 100'
              config:
                where: 'relative_humidity_pct is not null'
