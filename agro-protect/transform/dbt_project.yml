name: 'agroprotect'
version: '1.0.0'
config-version: 2

profile: 'agroprotect'

model-paths: ['models']
analysis-paths: ['analyses']
test-paths: ['tests']
seed-paths: ['seeds']
macro-paths: ['macros']
snapshot-paths: ['snapshots']

clean-targets:
  - 'target'
  - 'dbt_packages'

# Hooks to run before/after dbt commands
on-run-start:
  - >
    {% if target.name == 'dev' and env_var('DBT_USER', '') == '' %}
      {{ exceptions.raise_compiler_error('DBT_USER environment variable not set. Set it with: export DBT_USER="yourname"') }}
    {% endif %}
  - "{{ ensure_source_datasets() }}"

models:
  agroprotect:
    +persist_docs:
      relation: true
      columns: true
    staging:
      +schema: stg
      +materialized: view
    intermediate:
      +schema: int
      +materialized: view
    marts:
      +schema: marts
      +materialized: table

seeds:
  agroprotect:
    +schema: seed
    +quote_columns: false
