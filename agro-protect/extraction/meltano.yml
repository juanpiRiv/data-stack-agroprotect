# Por defecto prod = ayer (`days_back: 1`). Sin fechas fijas en el bloque base del tap.
default_environment: prod

project_id: agro-protect

# tap-agro → https://github.com/juanpiRiv/tap-meteorology (clima diario NASA POWER).
# `days_back` pisa start_date/end_date: 1 = ayer en `timezone`.
#   prod: `days_back: 1`. dev/ci: ventana corta con `days_back` (pruebas locales/CI).
#   yaml_window: solo para dispatch elt_meltano_yml en Actions (fechas acotadas; sin años en el bloque base).
# Histórico: ./scripts/run_tap_agro_bq_yearly.sh (setea start_date/end_date por corrida).
#
# Histórico automático año a año: ./scripts/run_tap_agro_bq_yearly.sh (TZ AR por defecto).
#
# BigQuery: method batch_job. project/location/credentials salen del entorno (source ../.env).
# Dataset: {MELTANO_ENVIRONMENT}_tap_agro (namespace del extractor).

plugins:
  extractors:
  - name: tap-agro
    namespace: tap_agro
    pip_url: git+https://github.com/juanpiRiv/tap-meteorology.git@main
    executable: tap-agro
    config:
      # Sin `location_catalog_path` el tap usa solo sample_rosario (ver tap-meteorology).
      # Rango de fechas: por entorno (prod/dev/ci/yaml_window) o overrides / run_tap_agro_bq_yearly.sh — no acá.
      timezone: America/Argentina/Buenos_Aires
      location_catalog_path: data/locations.csv
      # Obligatorio: el tap tiene use_open_meteo=true por defecto; solo NASA en este proyecto.
      use_open_meteo: false
      request_delay_seconds: 1
    select:
    - locations.*
    - clima_diario_nasa_power.*
  loaders:
  - name: target-jsonl
    variant: andyh1203
    pip_url: target-jsonl
  - name: target-bigquery
    variant: z3z1ma
    pip_url: git+https://github.com/z3z1ma/target-bigquery.git
    config:
      project: ${BIGQUERY_PROJECT_ID}
      dataset: ${MELTANO_ENVIRONMENT}_tap_agro
      location: ${BIGQUERY_LOCATION}
      credentials_path: ${MELTANO_GOOGLE_APPLICATION_CREDENTIALS}
      denormalized: false
      generate_view: true
      method: batch_job
      batch_size: 100000
      timeout: 7200
      fail_fast: false

environments:
# Pruebas locales: últimos 30 días (sin heredar años fijos del YAML).
- name: dev
  config:
    plugins:
      extractors:
      - name: tap-agro
        config:
          use_open_meteo: false
          days_back: 30
- name: ci
  config:
    plugins:
      extractors:
      - name: tap-agro
        config:
          use_open_meteo: false
          days_back: 1
# Ingest diario: ayer en timezone del tap.
- name: prod
  config:
    plugins:
      extractors:
      - name: tap-agro
        config:
          use_open_meteo: false
          request_delay_seconds: 1
          days_back: 1
# Solo GitHub Actions → elt_meltano_yml (ventana fija acotada; cambiá fechas si necesitás otra prueba).
- name: yaml_window
  config:
    plugins:
      extractors:
      - name: tap-agro
        config:
          use_open_meteo: false
          start_date: '2024-06-01'
          end_date: '2024-06-07'
