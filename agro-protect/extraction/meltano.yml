default_environment: dev

project_id: agro-protect

# tap-agro → https://github.com/juanpiRiv/tap-meteorology
#
# Fuentes: Open-Meteo (más fresco; API gratis con topes duros) vs NASA POWER (otro modelo,
# suele tolerar mejor históricos largos — no es “sin límite”, revisá la política NASA).
# Backfill por fases (~110 localidades):
#   1) Esta ventana: 2025-01-01 → end_date (actualizá end_date al día de corrida o usá config set abajo).
#   2) Al terminar: start_date=2024-01-01, end_date=2024-12-31 → meltano run …
#   3) Igual para 2023, 2022, … hasta cubrir el histórico (o ./scripts/run_tap_agro_bq_yearly.sh).
# Actualizar “hoy” sin editar YAML:
#   meltano --environment=prod config set tap-agro end_date "$(TZ=America/Argentina/Buenos_Aires date +%Y-%m-%d)"
#
# Histórico automático año a año: ./scripts/run_tap_agro_bq_yearly.sh (TZ AR por defecto).
#
# BigQuery: method batch_job. project/location/credentials salen del entorno (source ../.env).
# Dataset: {MELTANO_ENVIRONMENT}_tap_agro (namespace del extractor).

plugins:
  extractors:
  - name: tap-agro
    namespace: tap_agro
    pip_url: git+https://github.com/juanpiRiv/tap-meteorology.git@main
    executable: tap-agro
    config:
      # Fase 1 backfill: todo 2025 + año en curso hasta “hoy” (renová end_date al correr).
      start_date: '2025-01-01'
      end_date: '2026-03-20'
      timezone: America/Argentina/Buenos_Aires
      location_catalog_path: data/locations.csv
      # Tras 429 diario Open-Meteo: NASA solo (false/true). Para “ayer” diario + frescura: Open-Meteo solo o ambas.
      use_open_meteo: false
      use_nasa_power: true
      # NASA: 1s suele ir bien; si ves errores/throttle, subí a 2–3. Open-Meteo necesita más.
      request_delay_seconds: 1
    select:
    - locations.*
    - clima_diario_nasa_power.*

  loaders:
  - name: target-jsonl
    variant: andyh1203
    pip_url: target-jsonl
  - name: target-bigquery
    variant: z3z1ma
    pip_url: git+https://github.com/z3z1ma/target-bigquery.git
    config:
      project: ${BIGQUERY_PROJECT_ID}
      dataset: ${MELTANO_ENVIRONMENT}_tap_agro
      location: ${BIGQUERY_LOCATION}
      credentials_path: ${MELTANO_GOOGLE_APPLICATION_CREDENTIALS}
      denormalized: false
      generate_view: true
      method: batch_job
      batch_size: 100000
      timeout: 7200
      fail_fast: false

environments:
- name: dev
- name: ci
# prod: subí delay si cambiás a Open-Meteo o NASA se queja.
- name: prod
  config:
    plugins:
      extractors:
      - name: tap-agro
        config:
          request_delay_seconds: 1
